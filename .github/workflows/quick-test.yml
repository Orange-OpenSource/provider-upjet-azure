name: Smoke Test Package Publish

on:
  workflow_dispatch:
    inputs:
      subpackages:
        description: 'Subpackages to smoke test (for example: config or "config authorization")'
        default: 'config'
        required: false
        type: string
      version:
        description: 'Optional version tag to publish. Leave empty to auto-generate a smoke tag.'
        default: ''
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  smoke-test-publish:
    uses: ./.github/workflows/publish-provider-family.yml
    with:
      subpackages: ${{ inputs.subpackages }}
      size: '1'
      concurrency: '1'
      repository: provider-azure
      version: ${{ inputs.version != '' && inputs.version || format('v0.0.0-smoke.{0}', github.run_number) }}
      go-version: '1.25.11'
      cleanup-disk: false
      runs-on: ubuntu-latest
      platforms: 'linux_amd64'
      batch-platforms: 'linux_amd64'
      mirror-to-upbound-registry: false
